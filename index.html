<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body {
    margin: 0;
    background: transparent; /* TRANSPARENT */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .btn {
    position: relative;
    width: 480px;
    height: 95px;
    border-radius: 999px;
    background: #050814;
    text-decoration: none;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    cursor: pointer;
    font-family: Arial, sans-serif;

    box-shadow:
      inset 0 0 18px rgba(40, 90, 255, 0.25),
      0 0 25px rgba(20, 60, 200, 0.2);
  }

  /* Lueur tournante */
  .btn::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: inherit;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      transparent 260deg,
      #2f6cff 300deg,
      #ffffff 315deg,
      #2f6cff 330deg,
      transparent 360deg
    );
    animation: rotateGlow 2.5s linear infinite;
    z-index: 0;
  }

  /* Masque intérieur */
  .btn::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: inherit;
    background: #050814;
    z-index: 1;
  }

  .btn span {
    position: relative;
    z-index: 3;
    color: #7ea6ff;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    text-align: center;
    padding: 0 20px;
    text-shadow: 0 0 10px rgba(80, 120, 255, 0.7);
  }

  /* Aura souris */
  .mouse-aura {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(80, 130, 255, 0.6) 0%,
      rgba(80, 130, 255, 0.25) 40%,
      transparent 70%
    );
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    z-index: 2;
    transition: opacity 0.25s ease;
    filter: blur(10px);
  }

  .btn:hover .mouse-aura {
    opacity: 1;
  }

  @keyframes rotateGlow {
    to {
      transform: rotate(360deg);
    }
  }
</style>
</head>

<body>

<a href="https://phonexpress.odoo.com/demande-de-devis" target="_blank" class="btn">
  <span>Faites réparer votre appareil</span>
  <i class="mouse-aura"></i>
</a>

<script>
  const button = document.querySelector(".btn");
  const aura = document.querySelector(".mouse-aura");

  button.addEventListener("mousemove", (e) => {
    const rect = button.getBoundingClientRect();
    aura.style.left = `${e.clientX - rect.left}px`;
    aura.style.top = `${e.clientY - rect.top}px`;
  });
</script>

</body>
</html>
