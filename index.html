<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouton animé</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .btn {
      position: relative;
      padding: 18px 45px;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 2px solid #00ff88;
      border-radius: 50px;
      overflow: hidden;
      transition: 0.4s ease;
      z-index: 1;
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: #00ff88;
      transition: 0.4s ease;
      z-index: -1;
    }

    .btn:hover::before {
      left: 0;
    }

    .btn:hover {
      color: #111;
      box-shadow:
        0 0 10px #00ff88,
        0 0 25px #00ff88,
        0 0 50px #00ff88,
        0 0 100px #00ff88;
      transform: scale(1.08);
    }
  </style>
</head>

<body>
  <a href="#" class="btn">Hover Me</a>
</body>
</html>
