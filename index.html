<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Button Glow</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #111214;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  .btn {
    position: relative;
    width: 330px;
    height: 95px;
    border-radius: 999px;
    background: #030305;
    border: none;
    color: #7f67ff;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    overflow: hidden;
    box-shadow:
      inset 0 0 18px rgba(130, 90, 255, 0.28),
      0 0 25px rgba(90, 70, 180, 0.18);
  }

  .btn::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: inherit;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      transparent 250deg,
      #7b5cff 290deg,
      #ffffff 310deg,
      #7b5cff 330deg,
      transparent 360deg
    );
    animation: rotateGlow 2.4s linear infinite;
    z-index: 0;
  }

  .btn::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: inherit;
    background: #030305;
    z-index: 1;
  }

  .btn span {
    position: relative;
    z-index: 3;
    text-shadow: 0 0 14px rgba(126, 98, 255, 0.85);
  }

  .btn .mouse-aura {
    position: absolute;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(135, 100, 255, 0.55) 0%,
      rgba(135, 100, 255, 0.25) 35%,
      transparent 70%
    );
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    z-index: 2;
    transition: opacity 0.25s ease;
    filter: blur(8px);
  }

  .btn:hover .mouse-aura {
    opacity: 1;
  }

  @keyframes rotateGlow {
    to {
      transform: rotate(360deg);
    }
  }
</style>
</head>

<body>

<button class="btn">
  <span>BUTTON</span>
  <i class="mouse-aura"></i>
</button>

<script>
  const button = document.querySelector(".btn");
  const aura = document.querySelector(".mouse-aura");

  button.addEventListener("mousemove", (e) => {
    const rect = button.getBoundingClientRect();
    aura.style.left = `${e.clientX - rect.left}px`;
    aura.style.top = `${e.clientY - rect.top}px`;
  });
</script>

</body>
</html>
